
mtproxy_avx2bmi2_support: false
mtproxy_haproxy: true
mtproxy_force_secret: false
mtproxy_release: 0.10.0
mtproxy_url: "https://github.com/sleep3r/mtproto.zig/releases/download/v{{ mtproxy_release }}/mtproto-proxy-linux-x86_64{{ '_v3' if mtproxy_avx2bmi2_support }}.tar.gz"
mtproxy_installdir: /opt/mtproto-proxy
mtproxy_bin: "mtproto-proxy"
mtproxy_config: "config.toml"
mtproxy_secret: "mtproto.secret"
mtproxy_service_tlsdomain: google.com
mtproxy_service_secret: "" # $(openssl rand -hex 16)
mtproxy_service_address: 127.0.7.7
mtproxy_service_port: 7443
mtproxy_service_user: mtproxy #     useradd --system --no-create-home --shell /usr/sbin/nologin mtproto
mtproxy_service_group: mtproxy #     useradd --system --no-create-home --shell /usr/sbin/nologin mtproto
mtproxy_dirs:
  - path: "{{ mtproxy_installdir }}"
