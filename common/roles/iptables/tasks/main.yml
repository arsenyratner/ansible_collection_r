- name: sysctl
  ansible.posix.sysctl:
    name: "{{ firewall_item.name }}"
    value: "{{ firewall_item.value }}"
  loop: "{{ firewall_default_sysctl + firewall_sysctl }}"
  loop_control:
    loop_var: firewall_item
  when: (firewall_default_sysctl + firewall_sysctl) != []
